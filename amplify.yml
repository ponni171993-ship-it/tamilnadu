version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    backend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm install
      artifacts:
        baseDirectory: backend
        files:
          - '**/*'
      cache:
        paths:
          - backend/node_modules/**/*
functions:
  registerUser:
    runtime: nodejs18.x
    handler: index.handler
    environment:
      _AWS_ACCESS_KEY_ID: ${_AWS_ACCESS_KEY_ID}
      _AWS_SECRET_ACCESS_KEY: ${_AWS_SECRET_ACCESS_KEY}
      _AWS_REGION: ${_AWS_REGION}
      _AWS_S3_BUCKET_NAME: ${_AWS_S3_BUCKET_NAME}
    apiGateway:
      path: /api/register
      method: [GET, POST]
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:Query
          - dynamodb:Scan
        Resource: arn:aws:dynamodb:*:*:table/users
