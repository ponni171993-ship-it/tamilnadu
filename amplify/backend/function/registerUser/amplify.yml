version: 1
backend:
  phases:
    preBuild:
      commands:
        - npm install express multer cors dotenv
    build:
      commands:
        - echo "Build completed"
  runtime:
    name: nodejs18.x
  environment:
    MONGODB_URI: ${MONGODB_URI}
    _AWS_ACCESS_KEY_ID: ${_AWS_ACCESS_KEY_ID}
    _AWS_SECRET_ACCESS_KEY: ${_AWS_SECRET_ACCESS_KEY}
    _AWS_REGION: ${_AWS_REGION}
    _AWS_S3_BUCKET_NAME: ${_AWS_S3_BUCKET_NAME}
