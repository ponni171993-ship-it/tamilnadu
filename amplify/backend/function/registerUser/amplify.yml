version: 1
backend:
  phases:
    preBuild:
      commands:
        - npm install busboy pdfkit @aws-sdk/client-dynamodb @aws-sdk/lib-dynamodb
    build:
      commands:
        - echo "Lambda function built successfully"
  runtime:
    name: nodejs18.x
  environment:
    _AWS_ACCESS_KEY_ID: ${_AWS_ACCESS_KEY_ID}
    _AWS_SECRET_ACCESS_KEY: ${_AWS_SECRET_ACCESS_KEY}
    _AWS_REGION: ${_AWS_REGION}
    _AWS_S3_BUCKET_NAME: ${_AWS_S3_BUCKET_NAME}
